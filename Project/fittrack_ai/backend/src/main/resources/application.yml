server:
  port: ${PORT:8080}

spring:
  application:
    name: fittrack-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  jackson:
    time-zone: Asia/Ho_Chi_Minh

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  jwt:
    secret: ${JWT_SECRET:fittrack_super_secret_key_fittrack_super_secret_key_2026}
    expiration-ms: ${JWT_EXPIRATION_MS:604800000}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
