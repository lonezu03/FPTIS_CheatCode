server:
  port: ${PORT:${SERVER_PORT:8080}}

spring:
  application:
    name: fittrack-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fittrack_db}
    username: ${SPRING_DATASOURCE_USERNAME:fittrack_user}
    password: ${SPRING_DATASOURCE_PASSWORD:fittrack_password}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: false

  jackson:
    time-zone: Asia/Ho_Chi_Minh

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  jwt:
    secret: ${JWT_SECRET:fittrack_super_secret_key_fittrack_super_secret_key_2026}
    expiration-ms: ${JWT_EXPIRATION_MS:604800000}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
